name: Diffusion_Policy_Unet_Hybrid_Image
instantiate_config:
  _target_: mappolicy.models.diffusion_policy.diffusion_unet_hybrid_image_policy.DiffusionUnetHybridImagePolicy
  shape_meta:
    action:
      shape:
      - 7
    obs:
      robot_state:
        shape:
        - 8
        type: robot_state
      image:
        shape:
        - 3
        - 128
        - 128
        type: rgb
  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddpm.DDPMScheduler
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    beta_start: 0.0001
    clip_sample: true
    num_train_timesteps: 100
    prediction_type: epsilon
    variance_type: fixed_small
  horizon: 16
  n_action_steps: 8
  n_obs_steps: 2
  num_inference_steps: 100
  obs_as_global_cond: true
  diffusion_step_embed_dim: 128
  down_dims:
  - 512
  - 1024
  - 2048
  kernel_size: 5
  n_groups: 8
  cond_predict_scale: true